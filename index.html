<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte a Nuestra Boda - Tatiana & Martín</title>
    <link rel="stylesheet" href="estilo.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<audio id="background-music" loop>
    <source src="musica.mp3" type="audio/mpeg">
    Tu navegador no soporta audio.
</audio>

<button id="music-toggle" onclick="toggleMusic()">🔊 Música</button>

<div class="book-container">
    <div class="book" id="passport">

        <div class="page" onclick="turnPage(0)">
            <div class="page-face front">
                <img src="portada.jpeg" alt="Portada">
            </div>
            <div class="page-face back">
                <img src="respaldo.jpg" alt="Reverso Pasaporte">
            </div>
        </div>

        <div class="page" onclick="turnPage(1)">
            <div class="page-face front">
                <img src="datos.png" alt="Datos">
            </div>
            <div class="page-face back">
                <img src="respaldo.jpg" alt="Reverso Pasaporte">
            </div>
        </div>

        <div class="page" onclick="turnPage(2)">
            <div class="page-face front">
                <div class="map-wrapper">
            <img src="mapa.png" alt="Mapa" class="map-img">

            <div class="country-pin" style="top: 36.5%; left: 23.5%;">
                <div class="tooltip-photo"><img src="photos/estados unidos.jpg.jpeg" alt="Estados Unidos"></div>
            </div>

            <div class="country-pin" style="top: 42.0%; left: 21.0%;">
                <div class="tooltip-photo"><img src="photos/MEXICO.jpg.jpeg" alt="México"></div>
            </div>

            <div class="country-pin" style="top: 48.5%; left: 28.5%;">
                <div class="tooltip-photo"><img src="photos/colombia.jpg.jpeg" alt="Colombia"></div>
            </div>

            <div class="country-pin" style="top: 52.0%; left: 36.5%;">
                <div class="tooltip-photo"><img src="photos/brasil.jpg.jpeg" alt="Brasil"></div>
            </div>

            <div class="country-pin" style="top: 61.0%; left: 31.5%;">
                <div class="tooltip-photo"><img src="photos/argentina.jpg.jpeg" alt="Argentina"></div>
            </div>

            <div class="country-pin" style="top: 32.5%; left: 47.0%;">
                <div class="tooltip-photo"><img src="photos/inglaterra.jpg.jpeg" alt="Inglaterra"></div>
            </div>

            <div class="country-pin" style="top: 35.0%; left: 48.5%;">
                <div class="tooltip-photo"><img src="photos/paris.jpg.jpeg" alt="París"></div>
            </div>
        </div>
    </div>
    <div class="page-face back">
        <img src="respaldo.jpg" alt="Reverso Pasaporte">
    </div>
</div>

        <div class="page" onclick="turnPage(3)">
            <div class="page-face front">
                <img src="sellos.png" alt="Sellos">
            </div>
            <div class="page-face back">
                <img src="respaldo.jpg" alt="Reverso Pasaporte">
            </div>
        </div>

        <div class="page" onclick="turnPage(4)">
            <div class="page-face front">
                <div class="countdown-wrapper">
                    <img src="confirmacion.png" alt="Confirmación">
                    <div class="countdown-container">
                        <div class="time-box"><span id="days">00</span><small>Días</small></div>
                        <div class="time-box"><span id="hours">00</span><small>Horas</small></div>
                        <div class="time-box"><span id="minutes">00</span><small>Min</small></div>
                        <div class="time-box"><span id="seconds">00</span><small>Seg</small></div>
                    </div>
                </div>
            </div>
            <div class="page-face back">
                <img src="contraportada.jpg" alt="Contraportada">
            </div>
        </div>

    </div>
</div>

<div class="controls">
    <button onclick="prevPage()">Anterior</button>
    <button onclick="nextPage()">Siguiente</button>
</div>

<script src="script.js"></script>
</body>
</html>
